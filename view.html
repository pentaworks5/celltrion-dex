<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>셀트리온제약 디지털 디테일링</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #003087;
      --accent:  #00A8E0;
      --green:   #00C896;
      --warn:    #FF6B35;
      --dark:    #0A0F1E;
      --card-bg: rgba(255,255,255,0.04);
      --border:  rgba(255,255,255,0.08);
      --white:   #F0F4FF;
      --text-muted: rgba(240,244,255,0.45);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--dark);
      color: var(--white);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── 로딩 화면 ── */
    #loading-screen {
      position: fixed; inset: 0; z-index: 999;
      background: var(--dark);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(0,168,224,0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 에러 화면 ── */
    #error-screen {
      display: none;
      position: fixed; inset: 0; z-index: 998;
      background: var(--dark);
      align-items: center; justify-content: center;
      flex-direction: column; gap: 16px; padding: 32px; text-align: center;
    }
    #error-screen .err-icon { font-size: 64px; }
    #error-screen h2 { font-size: 20px; color: var(--warn); }
    #error-screen p  { font-size: 14px; color: var(--text-muted); line-height: 1.7; }

    /* ── 뷰어 래퍼 ── */
    #viewer {
      display: none;
      width: 100%; max-width: 480px;
      min-height: 100vh;
      flex-direction: column;
      padding: 0 0 80px;
    }

    /* ── 헤더 ── */
    .viewer-header {
      text-align: center;
      padding: 28px 20px 16px;
    }
    .brand-tag {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(0,168,224,0.1);
      border: 1px solid var(--accent);
      border-radius: 20px;
      padding: 5px 16px;
      font-size: 12px; color: var(--accent);
      letter-spacing: 1px; text-transform: uppercase;
      margin-bottom: 14px;
    }
    .viewer-title {
      font-size: 26px; font-weight: 900;
      line-height: 1.3;
    }

    /* ── 프로그레스 ── */
    .prog-wrap {
      display: flex; align-items: center; justify-content: center;
      gap: 6px; padding: 8px 20px 16px;
    }
    .prog-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      transition: all 0.3s;
      cursor: pointer;
    }
    .prog-dot.active { background: var(--accent); transform: scale(1.3); }
    .prog-dot.done   { background: var(--green); }

    /* ── 카드 스테이지 ── */
    .card-stage {
      position: relative;
      margin: 0 16px;
      min-height: 500px;
    }
    .card-slide {
      display: none;
      border-radius: 20px;
      overflow: hidden;
      background: var(--card-bg);
      border: 1px solid var(--border);
      min-height: 500px;
    }
    .card-slide.active { display: block; }
    .card-slide img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 20px;
    }
    .card-inner {
      padding: 28px 24px;
      min-height: 500px;
      display: flex; flex-direction: column; justify-content: center;
    }
    .card-tag {
      font-size: 11px; font-weight: 700;
      color: var(--accent); letter-spacing: 1.5px;
      text-transform: uppercase; margin-bottom: 16px;
    }
    .card-title {
      font-size: 26px; font-weight: 900;
      line-height: 1.3; margin-bottom: 16px;
    }

    /* ── 네비게이션 ── */
    .card-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 20px 0;
    }
    .nav-arrow {
      width: 48px; height: 48px; border-radius: 50%;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      color: var(--white); font-size: 18px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .nav-arrow:hover:not(:disabled) { background: rgba(0,168,224,0.2); border-color: var(--accent); }
    .nav-arrow:disabled { opacity: 0.3; cursor: default; }
    .card-counter { font-size: 13px; color: var(--text-muted); }

    /* ── 하단 안내 ── */
    .viewer-footer {
      margin: 20px 16px 0;
      padding: 14px 18px;
      background: rgba(0,168,224,0.05);
      border: 1px solid rgba(0,168,224,0.15);
      border-radius: 14px;
      font-size: 12px; color: var(--text-muted);
      line-height: 1.7; text-align: center;
    }
    .viewer-footer strong { color: var(--accent); }

    /* ── 퀴즈 ── */
    .quiz-option {
      padding: 12px 16px; margin: 8px 0;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 14px; cursor: pointer;
      transition: all 0.2s;
    }
    .quiz-option:hover   { background: rgba(0,168,224,0.15); border-color: var(--accent); }
    .quiz-option.correct { background: rgba(0,200,150,0.2);  border-color: var(--green); color: var(--green); }
    .quiz-option.wrong   { background: rgba(255,107,53,0.15); border-color: var(--warn);  color: var(--warn); }

    /* ── Celltrion 로고 워터마크 ── */
    .watermark {
      position: fixed; bottom: 16px; right: 16px;
      font-size: 10px; color: rgba(255,255,255,0.2);
      letter-spacing: 1px;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>

<!-- 로딩 -->
<div id="loading-screen">
  <div class="spinner"></div>
  <div style="font-size:14px;color:var(--text-muted)">콘텐츠를 불러오는 중...</div>
</div>

<!-- 에러 -->
<div id="error-screen">
  <div class="err-icon">😕</div>
  <h2 id="err-title">콘텐츠를 찾을 수 없습니다</h2>
  <p id="err-msg">링크가 만료되었거나 잘못된 QR 코드입니다.<br>담당 MR에게 다시 받아보세요.</p>
</div>

<!-- MR 메시지 박스 -->
<div id="mr-message-box" style="display:none;max-width:520px;margin:16px auto;background:linear-gradient(135deg,rgba(0,48,135,0.6),rgba(0,168,224,0.2));border:1px solid rgba(0,168,224,0.3);border-radius:16px;padding:20px 24px;backdrop-filter:blur(10px)">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
    <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#003087,#00A8E0);display:flex;align-items:center;justify-content:center;font-size:16px">👨‍⚕️</div>
    <div>
      <div style="font-size:11px;color:rgba(0,168,224,0.8);letter-spacing:1px">CELLTRION MR MESSAGE</div>
      <div style="font-size:13px;font-weight:700;color:#fff" id="mr-message-name">-</div>
    </div>
  </div>
  <p id="mr-message-text" style="font-size:14px;color:rgba(255,255,255,0.9);line-height:1.7;margin:0;white-space:pre-line"></p>
</div>

<!-- 뷰어 -->
<div id="viewer">
  <div class="viewer-header">
    <div class="brand-tag" id="brand-tag">💊 CELLTRION</div>
    <div class="viewer-title" id="viewer-title">콘텐츠 로딩 중</div>
  </div>

  <div class="prog-wrap" id="prog-wrap"></div>

  <div class="card-stage" id="card-stage">
    <!-- 슬라이드가 동적으로 생성됩니다 -->
  </div>

  <div class="card-nav">
    <button class="nav-arrow" id="prev-btn" onclick="changeCard(-1)" disabled>←</button>
    <span class="card-counter" id="card-counter">1 / 1</span>
    <button class="nav-arrow" id="next-btn" onclick="changeCard(1)" disabled>→</button>
  </div>

  <div class="viewer-footer" id="viewer-footer">
    담당 MR: <strong id="mr-name-display">-</strong><br>
    더 자세한 정보는 담당 MR에게 문의하세요
  </div>
</div>

<div class="watermark">CELLTRION PHARMACEUTICALS</div>

<script>
// ── Supabase 설정 ──
const SUPA_URL = 'https://njozowwsxzsltvcmhzoi.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qb3pvd3dzeHpzbHR2Y21oem9pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTkyNDYsImV4cCI6MjA4ODc5NTI0Nn0.8EhnXKe2zoFTbx9Pb0uflixseej_h8YdoWOK1CySHkY';

// 기기 고유 ID (같은 의사 중복 카운트 방지)
function getDeviceId() {
  let did = localStorage.getItem('cdex_device_id');
  if (!did) {
    did = 'dev_' + Math.random().toString(36).slice(2,10) + '_' + Date.now().toString(36);
    localStorage.setItem('cdex_device_id', did);
  }
  return did;
}

let _db = null;
function getDB() {
  if (_db) return _db;
  if (window.supabase) _db = window.supabase.createClient(SUPA_URL, SUPA_KEY, { auth: { persistSession: false } });
  return _db;
}

let currentCard = 0;
let totalCards  = 1;

// ── URL 파라미터 파싱 ──
function getParam(key) {
  return new URLSearchParams(window.location.search).get(key);
}

// ── Supabase fetch ──
async function supaFetch(path) {
  const res = await fetch(SUPA_URL + '/rest/v1/' + path, {
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY
    }
  });
  if (!res.ok) throw new Error('DB error ' + res.status);
  return res.json();
}

// ── 스캔 로그 기록 ──
async function logScan(mrId, contentId) {
  const deviceId = getDeviceId();
  try {
    const db = getDB();
    if (db) {
      // 같은 기기+같은 콘텐츠 이미 존재하면 INSERT 안함
      const { data: existing } = await db.from('scan_logs')
        .select('id')
        .eq('mr_id', mrId)
        .eq('content_id', contentId)
        .eq('hospital', deviceId)
        .limit(1);
      if (existing && existing.length > 0) {
        console.log('⏭ 중복 스캔 무시 (같은 기기+콘텐츠)');
        return;
      }
      const { error } = await db.from('scan_logs').insert({ mr_id: mrId, content_id: contentId, hospital: deviceId, scanned_at: new Date().toISOString() });
      if (error) console.error('❌ scan_logs 저장 실패:', JSON.stringify(error));
      else console.log('✅ scan_logs 저장 성공');
    } else {
      // fetch 방식 - 중복 체크
      const check = await fetch(SUPA_URL + '/rest/v1/scan_logs?mr_id=eq.' + encodeURIComponent(mrId) + '&content_id=eq.' + encodeURIComponent(contentId) + '&hospital=eq.' + encodeURIComponent(deviceId) + '&select=id&limit=1',
        { headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY } });
      const existing = await check.json();
      if (existing && existing.length > 0) { console.log('⏭ 중복 스캔 무시'); return; }
      await fetch(SUPA_URL + '/rest/v1/scan_logs', {
        method: 'POST',
        headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify({ mr_id: mrId, content_id: contentId, hospital: deviceId, scanned_at: new Date().toISOString() })
      });
      console.log('✅ scan_logs 저장 성공 (fetch)');
    }
  } catch(e) { console.error('❌ scan log exception:', e); }
}

// ── 카드 이동 ──
function changeCard(dir) {
  const slides = document.querySelectorAll('.card-slide');
  slides[currentCard].classList.remove('active');
  currentCard = Math.max(0, Math.min(totalCards - 1, currentCard + dir));
  slides[currentCard].classList.add('active');
  updateNav();
}

function updateNav() {
  const dots = document.querySelectorAll('.prog-dot');
  dots.forEach((d, i) => {
    d.className = 'prog-dot';
    if (i < currentCard)  d.classList.add('done');
    if (i === currentCard) d.classList.add('active');
  });
  document.getElementById('card-counter').textContent = (currentCard + 1) + ' / ' + totalCards;
  document.getElementById('prev-btn').disabled = currentCard === 0;
  document.getElementById('next-btn').disabled = currentCard === totalCards - 1;
}

// ── 뷰어 렌더링 ──
function renderContent(content, mrName) {
  // 헤더
  document.getElementById('brand-tag').textContent =
    content.emoji + ' ' + (content.tags && content.tags[0] ? content.tags[0] : 'CELLTRION');
  document.getElementById('viewer-title').textContent = content.title;
  document.getElementById('mr-name-display').textContent = mrName + ' MR';

  const stage = document.getElementById('card-stage');
  stage.innerHTML = '';

  if (content.type === 'card' && content.slides && content.slides.length > 0) {
    // ── 카드뉴스 ──
    content.slides.forEach((slide, i) => {
      const div = document.createElement('div');
      div.className = 'card-slide' + (i === 0 ? ' active' : '');

      const src  = typeof slide === 'object' ? slide.src  : null;
      const name = typeof slide === 'object' ? slide.name : slide;

      if (src) {
        div.innerHTML = `<img src="${src}" alt="${name}">`;
      } else {
        div.innerHTML = `<div class="card-inner">
          <div class="card-tag">${i + 1} / ${content.slides.length}</div>
          <div class="card-title">${name}</div>
        </div>`;
      }
      stage.appendChild(div);
    });

  } else if (content.type === 'video') {
    // ── 영상 ──
    const div = document.createElement('div');
    div.className = 'card-slide active';
    div.innerHTML = `<div class="card-inner" style="text-align:center">
      <div style="font-size:64px;margin-bottom:16px">🎬</div>
      <div class="card-title">${content.title}</div>
      <div style="font-size:13px;color:var(--text-muted);margin-top:8px">${content.video_name || ''}</div>
    </div>`;
    stage.appendChild(div);

  } else if (content.type === 'quiz') {
    // ── 퀴즈 ──
    const div = document.createElement('div');
    div.className = 'card-slide active';
    const opts = (content.options || []).map((opt, i) =>
      `<div class="quiz-option" onclick="selectQuiz(this, ${i}, ${content.answer})">${String.fromCharCode(65+i)}. ${opt}</div>`
    ).join('');
    div.innerHTML = `<div class="card-inner">
      <div class="card-tag">🧠 Q&A 퀴즈</div>
      <div class="card-title" style="font-size:20px">${content.question || content.title}</div>
      <div style="margin-top:8px">${opts}</div>
      ${content.explanation
        ? `<div id="quiz-exp" style="display:none;margin-top:16px;padding:12px;background:rgba(0,200,150,0.1);border-radius:10px;font-size:13px;color:var(--green)">💡 ${content.explanation}</div>`
        : ''}
    </div>`;
    stage.appendChild(div);
  }

  // 프로그레스 바
  totalCards = stage.querySelectorAll('.card-slide').length;
  currentCard = 0;
  const progWrap = document.getElementById('prog-wrap');
  progWrap.innerHTML = '';
  for (let i = 0; i < totalCards; i++) {
    const dot = document.createElement('div');
    dot.className = 'prog-dot' + (i === 0 ? ' active' : '');
    dot.onclick = () => { currentCard = i - 1; changeCard(1); };
    progWrap.appendChild(dot);
  }
  updateNav();

  // 뷰어 표시
  document.getElementById('loading-screen').style.display = 'none';
  const viewer = document.getElementById('viewer');
  viewer.style.display = 'flex';
}

// ── 퀴즈 선택 ──
function selectQuiz(el, idx, answer) {
  document.querySelectorAll('.quiz-option').forEach(o => {
    o.style.pointerEvents = 'none';
  });
  el.classList.add(idx === answer ? 'correct' : 'wrong');
  if (idx === answer) {
    const exp = document.getElementById('quiz-exp');
    if (exp) exp.style.display = 'block';
  } else {
    document.querySelectorAll('.quiz-option')[answer].classList.add('correct');
  }
}

// ── 에러 표시 ──
function showError(title, msg) {
  document.getElementById('loading-screen').style.display = 'none';
  const err = document.getElementById('error-screen');
  err.style.display = 'flex';
  document.getElementById('err-title').textContent = title;
  document.getElementById('err-msg').textContent   = msg;
}

// ── 메인 로직 ──
async function init() {
  const mrId      = getParam('mid');
  const contentId = getParam('c');
  const mrMessage = getParam('msg') ? decodeURIComponent(getParam('msg')) : '';

  if (!mrId || !contentId || contentId === 'none') {
    showError('잘못된 QR 코드입니다', '올바른 QR 코드를 스캔해주세요.\n담당 MR에게 문의하세요.');
    return;
  }

  try {
    // MR 정보 + 콘텐츠 동시 조회 (SDK 우선, 폴백 fetch)
    let mrRows, contentRows;
    const db = getDB();
    if (db) {
      const [mrRes, contRes] = await Promise.all([
        db.from('mr_accounts').select('name,mr_id').eq('mr_id', mrId),
        db.from('contents').select('*').eq('id', contentId)
      ]);
      mrRows = mrRes.data || [];
      contentRows = contRes.data || [];
    } else {
      [mrRows, contentRows] = await Promise.all([
        supaFetch('mr_accounts?mr_id=eq.' + encodeURIComponent(mrId) + '&select=name,mr_id'),
        supaFetch('contents?id=eq.' + encodeURIComponent(contentId))
      ]);
    }

    if (!mrRows || mrRows.length === 0) {
      showError('담당 MR을 찾을 수 없습니다', 'MR ID: ' + mrId + '\n담당 MR에게 다시 QR을 받아보세요.');
      return;
    }
    if (!contentRows || contentRows.length === 0) {
      showError('콘텐츠를 찾을 수 없습니다', '콘텐츠가 삭제되었거나 비공개 상태입니다.\n담당 MR에게 문의하세요.');
      return;
    }

    const mr      = mrRows[0];
    const content = contentRows[0];

    // live, 배포중, active, paused 아닌 경우만 차단 (null/undefined는 허용)
    console.log('🔍 content.status:', content.status, '/ content.id:', content.id);
    const blockedStatuses = ['draft', 'paused', 'inactive'];
    if (content.status && blockedStatuses.includes(content.status)) {
      showError('현재 비공개 콘텐츠입니다', '이 콘텐츠는 현재 배포 중이 아닙니다.\n담당 MR에게 문의하세요.');
      return;
    }

    // MR 메시지 표시 (콘텐츠 위)
    const msgBox = document.getElementById('mr-message-box');
    const msgText = document.getElementById('mr-message-text');
    const mrNameEl = document.getElementById('mr-message-name');
    if (mrMessage && msgBox && msgText) {
      msgText.textContent = mrMessage;
      if (mrNameEl) mrNameEl.textContent = mr.name + ' MR';
      msgBox.style.display = 'block';
    }

    // slides 파싱 (Supabase TEXT[] → JSON array of objects)
    if (content.slides && typeof content.slides[0] === 'string') {
      try {
        content.slides = content.slides.map(s => {
          try { return JSON.parse(s); } catch(e) { return { name: s, src: null }; }
        });
      } catch(e) {}
    }

    // 스캔 로그 기록
    logScan(mr.mr_id, content.id);

    // 렌더링
    renderContent(content, mr.name);

  } catch(e) {
    console.error(e);
    showError('연결 오류', '인터넷 연결을 확인하고 다시 시도해주세요.\n오류: ' + e.message);
  }
}

// ── 터치 스와이프 지원 ──
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) changeCard(diff > 0 ? 1 : -1);
});

init();
</script>
</body>
</html>
